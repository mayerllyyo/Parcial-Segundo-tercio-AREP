<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribonacci - Math Microservices</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
        }
        label {
            font-weight: bold;
        }
        input[type="number"] {
            padding: 6px 10px;
            font-size: 16px;
            width: 120px;
            margin-right: 8px;
        }
        input[type="button"] {
            padding: 7px 18px;
            font-size: 16px;
            background-color: #2980b9;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }
        input[type="button"]:hover {
            background-color: #1a6fa8;
        }
        #result {
            margin-top: 20px;
            padding: 14px;
            background: #fff;
            border-left: 4px solid #2980b9;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
            min-height: 40px;
        }
        #error {
            color: #c0392b;
            margin-top: 10px;
        }
        .config {
            margin-bottom: 24px;
            padding: 12px;
            background: #eaf0fb;
            border-radius: 4px;
        }
        .config label {
            display: block;
            margin-bottom: 4px;
        }
        .config input[type="text"] {
            width: 340px;
            padding: 6px 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>Secuencia de Tribonacci</h1>
    <p>Calcula la secuencia de Tribonacci T(0) ... T(n) de forma asíncrona usando el Proxy Service.</p>

    <div class="config">
        <label for="proxyUrl">URL del Proxy Service:</label>
        <input type="text" id="proxyUrl" value="http://localhost:8090">
    </div>

    <form>
        <label for="value">Valor de n (entero no negativo):</label><br><br>
        <input type="number" id="value" name="value" value="13" min="0">
        <input type="button" value="Calcular" onclick="calcularTribonacci()">
    </form>

    <div id="error"></div>
    <div id="result"></div>

    <script>
        function calcularTribonacci() {
            var n = document.getElementById("value").value;
            var proxyUrl = document.getElementById("proxyUrl").value.replace(/\/$/, "");
            var url = proxyUrl + "/proxy/tribseq?value=" + encodeURIComponent(n);

            document.getElementById("result").innerHTML = "Calculando...";
            document.getElementById("error").innerHTML = "";

            var xhttp = new XMLHttpRequest();
            xhttp.onload = function() {
                if (this.status === 200) {
                    try {
                        var data = JSON.parse(this.responseText);
                        document.getElementById("result").innerHTML =
                            "<strong>Operación:</strong> " + data.operation + "\n" +
                            "<strong>Input n:</strong> " + data.input + "\n" +
                            "<strong>Secuencia:</strong> " + data.output;
                    } catch (e) {
                        document.getElementById("result").innerHTML = this.responseText;
                    }
                } else {
                    document.getElementById("error").innerHTML = "Error HTTP " + this.status + ": " + this.responseText;
                    document.getElementById("result").innerHTML = "";
                }
            };
            xhttp.onerror = function() {
                document.getElementById("error").innerHTML =
                    "No se pudo conectar al Proxy Service en " + proxyUrl +
                    ". Verifique que esté corriendo y que la URL sea correcta.";
                document.getElementById("result").innerHTML = "";
            };
            xhttp.open("GET", url);
            xhttp.send();
        }
    </script>
</body>
</html>
